# RELEASE: nodusrf/nodus-edge docker-compose.yml
services:
  nodus-edge:
    build:
      context: .
      dockerfile: Dockerfile
    image: nodusrf/nodus-edge:${NODUS_EDGE_TAG:-latest}
    privileged: true                     # Required for RTL-SDR USB access
    devices:
      - /dev/bus/usb:/dev/bus/usb       # RTL-SDR passthrough
    env_file: .env
    ports:
      - "8073:8073"                     # Edge dashboard
    volumes:
      - ./data:/data                    # audio capture + JSON output
      - ./repeaters.json:/app/nodus_edge/data/repeaters.json:ro
      - ./.env:/app/.env                # dashboard settings editor
    depends_on:
      whisper:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8082/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

  whisper:
    build:
      context: ./whisper-cpu
      dockerfile: Dockerfile
    image: nodusrf/nodus-edge:whisper-cpu
    environment:
      - WHISPER_MODEL=${WHISPER_MODEL:-base}
      - WHISPER_DEVICE=cpu
      - WHISPER_COMPUTE_TYPE=int8
    volumes:
      - whisper-models:/opt/whisper/models   # persist downloaded model
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

  support-sidecar:
    build:
      context: ./support-sidecar
      dockerfile: Dockerfile
    image: nodusrf/nodus-edge:support-sidecar
    environment:
      - TUNNEL_TOKEN=${NODUS_TUNNEL_TOKEN}
      - AUTHORIZED_KEYS=${NODUS_SUPPORT_AUTHORIZED_KEYS:-}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./data:/data:ro
      - .:/host/nodusnet                   # project dir for docker compose + .env edits
    profiles:
      - support
    restart: "no"

volumes:
  whisper-models:
